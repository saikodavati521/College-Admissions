# Azure ML Training and Deployment Pipeline
# Two-stage pipeline: Train (with RAI gate) -> Deploy (conditional)

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  # Azure ML workspace targeting variables
  azureResourceGroup: 'rg-admissions'
  azureWorkspaceName: 'Admissions-Workspace'
  # Service connection name for Azure authentication
  azureServiceConnection: 'Azure-ML-Admissions-Connection'  # TODO: Replace with your actual service connection name

stages:
# ============================================================================
# TRAIN STAGE
# ============================================================================
- stage: Train
  displayName: 'Train and Validate Model'
  jobs:
  - job: TrainJob
    displayName: 'Train Job - Model Training and RAI Validation'
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    # ========================================================================
    # INITIAL SETUP
    # ========================================================================
    
    - task: UsePythonVersion@0
      displayName: 'Use Python 3.9'
      inputs:
        versionSpec: '3.9'
        addToPath: true
    
    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install Python Dependencies'
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)
    
    # ========================================================================
    # STEP 1: Create/Update Custom Environment
    # ========================================================================
    - task: AzureCLI@2
      displayName: '1. Create/Update Azure ML Environment'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript' 
        inlineScript: |
          python create_env/create_env.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)

    # Step 2: Dataset Migration
    - task: AzureCLI@2
      displayName: '2. Dataset Migration'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python data_migration/migrate.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)

    # Step 3: Model Training
    - task: AzureCLI@2
      displayName: '3. Model Training'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python command_job.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)

    # Step 4: Register Model
    - task: AzureCLI@2
      displayName: 'Register Model'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python register_model/register.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)

    # Responsible AI Gate
    - task: AzureCLI@2
      displayName: 'Generate Responsible AI Dashboard'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python Responsible_AI_Insights/responsible.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)

    - task: AzureCLI@2
      displayName: 'RAI Analysis & Gate'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python Responsible_AI_Insights/model_analysis.py
          RAI_EXIT_CODE=$?
          if [ $RAI_EXIT_CODE -eq 0 ]; then
            echo "##vso[task.setvariable variable=rai_pass;isOutput=true]true"
            echo "RAI Gate: PASSED"
          else
            echo "##vso[task.setvariable variable=rai_pass;isOutput=true]false"
            echo "RAI Gate: FAILED"
            exit 1
          fi
      name: raiGate
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)


# ============================================================================
# DEPLOY STAGE
# ============================================================================
- stage: Deploy
  displayName: 'Deploy Model to Production'
  dependsOn: Train
  condition: and(succeeded(), eq(dependencies.Train.outputs['TrainJob.raiGate.rai_pass'], 'true'))
  jobs:
  - job: DeployJob
    displayName: 'Deploy Job - Model Deployment'
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    # ========================================================================
    # INITIAL SETUP
    # ========================================================================
    
    - task: UsePythonVersion@0
      displayName: 'Use Python 3.9'
      inputs:
        versionSpec: '3.9'
        addToPath: true
    
    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install Python Dependencies'
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)
    
    # ========================================================================
    # DEPLOYMENT STEPS
    # ========================================================================
    
    - task: AzureCLI@2
      displayName: '1. Create/Update Endpoint'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python model_deployment/endpoint_creation/endpoint.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)
    
    - task: AzureCLI@2
      displayName: '2. Deploy Model to Endpoint'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python model_deployment/deployment.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)
    
    - task: AzureCLI@2
      displayName: '3. Configure Model Monitoring'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          python model_deployment/model_monitoring/monitor.py
      env:
        resource_group_name: $(azureResourceGroup)
        workspace_name: $(azureWorkspaceName)
