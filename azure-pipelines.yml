# =============================================================================
# Azure ML Training and Deployment Pipeline
# =============================================================================
# Two-stage pipeline: Train (with RAI gate) -> Deploy (conditional)
#
# Stages:
#   1. CI: Model training, registration, and RAI validation
#   2. CD: Conditional deployment based on RAI gate results
# =============================================================================

trigger:
  - main
  - dev

pool:
  vmImage: ubuntu-latest

variables:
  # Azure ML workspace and other variables
  azureResourceGroup: 'saikoda' # Replace with your Resource Group Name
  azureWorkspaceName: 'mlwcapps001' # Replace with your Workspace Name
  alert_email: 'phanindrakodavati156@outlook.com' # Replace with your Email
  azureServiceConnection: 'Azure-ML-Admissions-Connection' # The name of your Azure Service Connection

stages:
  # ==================================
  # CI STAGE
  # ==================================
  - stage: CI
    displayName: 'CI Stage'
    jobs:
      - job: TrainJob
        displayName: 'Train Job - Model Training and RAI Gated Evaluation'
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          # ==================================
          # INITIAL SETUP
          # ==================================

          - task: AzureCLI@2
            displayName: 'Authenticate & Export Azure Subscription ID'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "Fetching subscription from service connection..."
                azure_subscription_id=$(az account show --query id -o tsv)

                # Export for the rest of the job
                echo "##vso[task.setvariable variable=subscription_id]$azure_subscription_id"

          - task: UsePythonVersion@0
            displayName: 'Use Python 3.9'
            inputs:
              versionSpec: '3.9'
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install Python Dependencies'
      
          # ==================================
          # TRAINING PIPELINE STEPS
          # ==================================

          - task: AzureCLI@2
            displayName: '1. Create/Update Azure ML Environment'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                python create_env/custom_env.py
            env:
              RESOURCE_GROUP: $(azureResourceGroup)
              WS_NAME: $(azureWorkspaceName)
              SUBSCRIPTION_ID: $(subscription_id)

          - task: AzureCLI@2
            displayName: '2. Dataset Migration'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                python data_migration/migrate.py
            env:
              RESOURCE_GROUP: $(azureResourceGroup)
              WS_NAME: $(azureWorkspaceName)
              SUBSCRIPTION_ID: $(subscription_id)

          - task: AzureCLI@2
            displayName: '3. Model Training'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Waiting 10 seconds for everything to be finished uploading..."
                sleep 10
                echo "Starting model training..."
                python model_training/command_job.py
            env:
              RESOURCE_GROUP: $(azureResourceGroup)
              WS_NAME: $(azureWorkspaceName)
              SUBSCRIPTION_ID: $(subscription_id)

          - task: AzureCLI@2
            displayName: '4. Register Model'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                python register_model/register.py
            env:
              RESOURCE_GROUP: $(azureResourceGroup)
              WS_NAME: $(azureWorkspaceName)
              SUBSCRIPTION_ID: $(subscription_id)

